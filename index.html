{"name": "Breathing line graph", "type": "Graph", "desc": "Line graph that can be interactive. Its dots can breathe as well.", "site": "hrreporter.com", "tags": ["CHRR", "line graph", "graph", "Pure CSS"], "code": "<style type=\"text/css\"> .chrr-jv-wrap, .chrr-jv-wrap *, .chrr-jv-wrap *::before, .chrr-jv-wrap *::after { box-sizing: border-box; margin: 0 !important; padding: 0 !important; font-family: 'Segoe UI', Arial, Helvetica, sans-serif !important; line-height: 1.4 !important; } .chrr-jv-wrap { max-width: 810px; margin: 0 auto 14px auto !important; color: #241f21 !important; font-size: 14px !important; overflow-x: auto; -webkit-overflow-scrolling: touch; } .chrr-jv-header { background: linear-gradient(135deg, #0b254d 0%, #164884 60%, #1a5a9e 100%); padding: 18px 22px 16px !important; text-align: center; border-radius: 8px 8px 0 0; box-shadow: 0 2px 8px rgba(22,72,132,0.18); } .chrr-jv-title { display: block !important; font-size: 20px !important; font-weight: 800 !important; color: #ffffff !important; text-transform: uppercase; letter-spacing: 1.8px; } .chrr-jv-body { background: linear-gradient(180deg, #f8fafe 0%, #eef3fa 100%) !important; border: 1px solid #c5d4e8; border-top: none; border-radius: 0 0 8px 8px; padding: 24px 18px 14px !important; position: relative; } .chrr-jv-legend { display: flex !important; justify-content: center; gap: 32px; margin-bottom: 18px !important; } .chrr-jv-legend-item { display: flex !important; align-items: center; gap: 8px; font-size: 14px !important; font-weight: 700 !important; color: #333 !important; } .chrr-jv-swatch { display: inline-block !important; width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; } .chrr-jv-swatch--vac { background: #c0392b !important; } .chrr-jv-swatch--pay { background: #164884 !important; } .chrr-jv-svg-wrap { position: relative; width: 100%; padding-bottom: 0 !important; } .chrr-jv-svg-wrap svg { display: block !important; width: 100%; height: auto; } @keyframes chrr-draw { to { stro
